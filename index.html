<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roise English 课程列表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f2f2f2;
  font-family: "Comic Sans MS", "Microsoft YaHei", Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 10px;
}

.app {
  width: 100%;
  max-width: 720px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.13);
  overflow: hidden;
}

.cover {
  background: linear-gradient(160deg, #e53935 0%, #b71c1c 100%);
  color: white;
  padding: 50px 30px 40px;
  text-align: center;
}
.cover .logo { font-size: 70px; margin-bottom: 10px; }
.cover .brand {
  font-size: 32px; font-weight: bold; letter-spacing: 2px;
  margin-bottom: 6px;
}
.cover .subtitle { font-size: 15px; opacity: .85; margin-bottom: 18px; }
.cover .divider {
  width: 60px; height: 3px; background: rgba(255,255,255,.5);
  margin: 0 auto 18px; border-radius: 2px;
}
.cover .desc { font-size: 15px; opacity: .9; line-height: 1.7; }

.lesson-list {
  padding: 20px 18px;
}

.lesson-list h3 {
  color: #e53935; font-size: 18px; margin-bottom: 16px;
}

.lesson-card {
  display: flex; align-items: center; gap: 14px;
  background: #f9f9f9; border-radius: 16px; padding: 16px 14px;
  margin-bottom: 14px;
  text-decoration: none;
  border: 2px solid #eee;
  transition: transform .18s, box-shadow .18s, border-color .18s;
  cursor: pointer;
}
.lesson-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,.1);
  border-color: #e53935;
}
.lesson-card:active { transform: scale(.97); }

.lesson-card .lc-icon {
  font-size: 44px; min-width: 50px; text-align: center;
}
.lesson-card .lc-info { flex: 1; }
.lesson-card .lc-title {
  font-size: 17px; font-weight: bold; color: #333;
}
.lesson-card .lc-sub {
  font-size: 13px; color: #888; margin-top: 3px;
}
.lesson-card .lc-arrow {
  font-size: 24px; color: #e53935;
}

.footer {
  text-align: center; padding: 20px;
  font-size: 13px; color: #aaa;
}
</style>
</head>
<body>
<div class="app">

  <div class="cover">
    <div class="logo">📚</div>
    <div class="brand">Roise English</div>
    <div class="subtitle">English Learning for Kids</div>
    <div class="divider"></div>
    <div class="desc">
      选择课程，点击开始学习<br>
      👆 点句子听发音 · 语速可调 · 有中文翻译
    </div>
  </div>

  <div class="lesson-list">
    <h3>📖 课程列表</h3>

    <a class="lesson-card" href="index.html">
      <div class="lc-icon">🍓</div>
      <div class="lc-info">
        <div class="lc-title">Session 3 · 水果摊 Role-play</div>
        <div class="lc-sub">Do you like strawberries? 草莓·橙子·葡萄·颜色</div>
      </div>
      <div class="lc-arrow">▶</div>
    </a>

    <a class="lesson-card" href="session4.html">
      <div class="lc-icon">🍎</div>
      <div class="lc-info">
        <div class="lc-title">Session 4 · 市场买水果 Story</div>
        <div class="lc-sub">Do you like green apples? 礼貌用语·角色扮演</div>
      </div>
      <div class="lc-arrow">▶</div>
    </a>

  </div>

  <div class="footer">
    Roise English · 点读学习页<br>
    每周三 18:00-19:00 / 周日 11:30-12:10
  </div>

</div>
</body>
</html>
